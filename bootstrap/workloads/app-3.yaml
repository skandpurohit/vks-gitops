apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-3
  namespace: argocd-instance-1
  finalizers:
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: default
  source:
    repoURL: https://github.com/skandpurohit/vks-gitops.git
    path: workloads/cl03/nginx
    targetRevision: main
    directory:
      recurse: true
  destination:
    name: cl03                    # matches the registered cluster name
    namespace: demo-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true